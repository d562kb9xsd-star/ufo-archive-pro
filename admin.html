<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - UFO Archive Pro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #444;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #4f7cff;
      color: white;
      border: none;
    }
    .secondary {
      background: #444;
    }
    .card {
      background: #151c33;
      border: 1px solid #2b355c;
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .actions button {
      width: auto;
      min-width: 120px;
    }
    #adminArea {
      display: none;
    }
    #status, #loginStatus {
      margin-top: 10px;
      color: #cfd8ff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin Review Queue</h1>

    <div id="loginArea">
      <label for="adminPassword">Admin password</label>
      <input id="adminPassword" type="password" placeholder="Enter admin password">
      <button id="loginBtn" type="button">Unlock admin</button>
      <div id="loginStatus"></div>
    </div>

    <div id="adminArea">
      <button id="lockBtn" class="secondary" type="button">Lock admin</button>
      <div id="status"></div>
      <div id="cases"></div>
    </div>
  </div>

  <script src="config.js?v=30"></script>
  <script src="admin.js?v=30"></script>
</body>
</html>
