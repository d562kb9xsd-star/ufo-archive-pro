<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - UFO Archive Pro</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container page-wrap">
    <div class="admin-card">
      <h1>Admin Review Queue</h1>
      <p class="page-intro">Enter the admin password to review reports.</p>

      <div id="loginArea" class="form-grid">
        <div>
          <label for="adminPassword">Admin password</label>
          <input id="adminPassword" type="password" placeholder="Enter admin password">
        </div>
        <button id="loginBtn" class="btn btn-primary" type="button">Unlock admin</button>
        <div id="loginStatus" class="status-message"></div>
      </div>

      <div id="adminArea" style="display:none;">
        <div class="admin-actions" style="margin-bottom:16px;">
          <button id="lockBtn" class="btn btn-secondary" type="button">Lock admin</button>
        </div>
        <div id="status" class="status-message"></div>
        <div id="cases" class="admin-list"></div>
      </div>
    </div>
  </div>

  <script src="config.js?v=50"></script>
  <script src="admin.js?v=50"></script>
</body>
</html>
