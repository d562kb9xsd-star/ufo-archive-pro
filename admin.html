<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin - UFO Archive Pro</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      background: #0b1020;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    input, button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    input {
      width: 100%;
      background: #151c33;
      color: white;
    }

    button {
      cursor: pointer;
      background: #4f7cff;
      color: white;
    }

    .secondary {
      background: #444;
    }

    .case {
      background: #151c33;
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
    }

    video, img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    #admin-protected {
      display: none;
    }

    #admin-status, #admin-login-status {
      margin-top: 10px;
      color: #cfd8ff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Admin Review Queue</h1>

    <!-- LOGIN -->
    <div id="admin-login">
      <label for="admin-password">Admin password</label>
      <input id="admin-password" type="password" placeholder="Enter password" />

      <button id="admin-login-btn">Unlock admin</button>

      <div id="admin-login-status"></div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-protected">
      <button id="admin-signout-btn" class="secondary">Lock admin</button>

      <div id="admin-status"></div>

      <div id="admin-list"></div>
    </div>
  </div>

  <!-- CONFIG -->
  <script src="config.js?v=99"></script>

  <!-- ADMIN SCRIPT (IMPORTANT VERSION PARAM) -->
  <script src="admin.js?v=99"></script>

</body>
</html>
