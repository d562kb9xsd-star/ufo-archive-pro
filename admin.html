<!DOCTYPE html>
<html>
<head>
  <title>Admin - UFO Archive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Admin Review Queue</h1>

<div id="admin-login">
  <input id="admin-email" placeholder="Email"><br><br>
  <input id="admin-password" type="password" placeholder="Password"><br><br>
  <button id="admin-login-btn">Sign in</button>
  <p id="admin-login-status"></p>
</div>

<div id="admin-protected" style="display:none;">
  <button id="admin-signout-btn">Sign out</button>
  <h2>Pending Reports</h2>
  <div id="admin-list"></div>
  <p id="admin-status"></p>
</div>

<script src="config.js?v=5"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js?v=5"></script>

</body>
</html>
