<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report a UFO Sighting | Submit Photos, Videos and Case Details</title>
  <meta name="description" content="Submit a UFO sighting with location, date, summary and supporting evidence such as photos or videos." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://ufocases.co.uk/submit.html" />

  <meta property="og:title" content="Report a UFO Sighting | Submit Photos, Videos and Case Details" />
  <meta property="og:description" content="Submit your UFO sighting for review with date, location and summary details." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ufocases.co.uk/submit.html" />
  <meta property="og:site_name" content="UFO Archive Pro" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">UFO Archive Pro</div>
      <nav class="menu">
        <a href="index.html">Home</a>
        <a href="archive.html">Archive</a>
        <a href="submit.html">Submit</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container page-wrap">
    <div class="form-card">
      <h1>Submit a UFO Report</h1>
      <p class="page-intro">
        Share the details of your sighting. Reports are submitted for review before they appear publicly.
      </p>

      <form id="submit-form" class="form-grid">
        <div>
          <label for="title">Title</label>
          <input id="title" name="title" required />
        </div>

        <div>
          <label for="location">Location</label>
          <input id="location" name="location" required />
        </div>

        <div>
          <label for="date_observed">Date observed</label>
          <input id="date_observed" name="date_observed" type="date" />
        </div>

        <div>
          <label for="tags">Tags (comma separated)</label>
          <input id="tags" name="tags" placeholder="orb, triangle, night sky" />
        </div>

        <div>
          <label for="summary">Summary</label>
          <textarea id="summary" name="summary" required></textarea>
        </div>

        <button class="btn btn-primary" type="submit">Submit report</button>
      </form>

      <div id="submit-status" class="status-message"></div>
    </div>
  </main>

  <script src="config.js?v=50"></script>
  <script src="submit.js?v=50"></script>
</body>
</html>
