<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Report a UFO Sighting UK | Submit Photos & Videos</title>

<meta name="description" content="Report a UFO sighting in the UK. Submit your UFO encounter with photos, videos, location, date and witness details." />
<meta name="keywords" content="report UFO UK, submit UFO sighting, UFO evidence UK" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://www.ufocases.co.uk/submit.html" />

<link rel="stylesheet" href="styles.css" />
</head>

<body>

<header>
  <div class="container nav">
    <div class="brand">UFO Archive Pro</div>
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="archive.html">Archive</a>
    </nav>
  </div>
</header>

<main class="container page-wrap">

<h1>Submit a UFO Report</h1>

<form id="report-form">

<input type="text" id="title" placeholder="Title" required />
<input type="text" id="location" placeholder="Location" required />
<input type="date" id="date" required />

<textarea id="description" placeholder="Describe what you saw" required></textarea>

<input type="file" id="media" accept="image/*,video/*" />

<button type="submit">Submit Report</button>

</form>

</main>

<script src="config.js?v=2001"></script>
<script src="submit.js?v=2001"></script>

</body>
</html>
